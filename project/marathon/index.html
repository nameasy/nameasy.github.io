    <script src="script.js"></script>
    <script>
        $(document).ready(function() {
            let t = $("main.marathon section.content ul li a div.overlay button");
            $(t).click(function() {
                $(this).toggleClass("watched"), event.preventDefault()
            }), $(t).click(function() {
                let t = $(this).attr("id");
                $(this).hasClass("watched") ? localStorage.setItem(t, "true") : localStorage.removeItem(t, "true")
            }), $(t).each(function() {
                let t = $(this).attr("id");
                "true" == localStorage.getItem(t) ? $(this).addClass("watched") : $(this).removeClass("watched")
            });
            let e = $("main.marathon section.result p span.total"),
                a = $("main.marathon section.result p span.number"),
                l = $("main.marathon section.result p span.declension"),
                n = $("main.marathon section.content ul li").length,
                o = $("main.marathon section.content ul li a div.overlay button.watched").length;
            a.html(o), e.html(n);
            let i = ["фильм", "фильма", "фильмов"][e % 100 > 4 && 20 > e % 100 ? 2 : [2, 0, 1, 1, 1, 2][5 > e % 10 ? e % 10 : 5]];
            l.html(i)
        });
    </script>
